<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎉</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INTRO -->
<div id="intro">This is a Surprise 🎁</div>

<!-- TEXT -->
<div id="funText">Catch the Gift 😜</div>

<!-- 🎁 3D GIFT -->
<div id="gift">
  <div class="gift-box">
    <div class="lid"></div>
    <div class="box"></div>
    <div class="ribbon-vertical"></div>
    <div class="ribbon-horizontal"></div>
  </div>
</div>

<!-- MENU -->
<div id="menu" style="display:none;">
  <h2>Select Your Surprise 🎁</h2>

  <button onclick="openPage('timer')">⏳ Timer</button>
  <button onclick="openPage('video')">🎥 Video</button>
  <button onclick="openPage('book')">💖 Scrapbook</button>
</div>

<!-- TIMER -->
<div id="timerPage" style="display:none;">
  <h1>Countdown 🎂</h1>
  <div id="bigTimer"></div>
  <button onclick="goBack()">⬅ Back</button>
</div>

<!-- VIDEO -->
<div id="videoPage" style="display:none; text-align:center;">
  <h1>Special Video 🎥</h1>
  <video src="./videos/bhumika.mp4" controls style="width:80%; border-radius:12px;"></video>
  <br><br>
  <button onclick="goBack()">⬅ Back</button>
</div>

<!-- 📖 SCRAPBOOK -->
<div id="book" style="display:none;">
  <div id="pagesContainer">

    <div class="page active">
      <div class="left">
        <img src="./scrapbook/20240429_230322.jpg">
      </div>
      <div class="right">You make life brighter ✨</div>
    </div>

    <div class="page">
      <div class="left">
        <img src="./scrapbook/20240906_204953.jpg">
      </div>
      <div class="right">Every moment is special 💖</div>
    </div>

    <div class="page">
      <div class="left">
        <img src="./scrapbook/VideoCapture_20240427-034201.jpg">
      </div>
      <div class="right">Memories stay forever 🌸</div>
    </div>

    <div class="page">
      <div class="left">
        <img src="./scrapbook/image.jpg">
      </div>
      <div class="right">Every picture tells a story 📸</div>
    </div>

    <div class="page">
      <div class="left">
        <video src="./scrapbook/bhumika.mp4" autoplay loop muted></video>
      </div>
      <div class="right">Moments to relive 🎬</div>
    </div>

  </div>

  <div style="text-align:center; margin-top:20px;">
    <button onclick="prevPage()">⬅ Prev</button>
    <button onclick="nextPage()">Next ➡</button>
    <button onclick="goBack()">⬅ Back</button>
  </div>
</div>

<!-- MUSIC -->
<audio id="bgMusic" src="./audio/bg.mp3" loop></audio>

<script src="script.js"></script>

</body>
</html>
