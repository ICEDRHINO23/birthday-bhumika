<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Bhoomika 🎂</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INTRO -->
<div id="intro">✨ Loading Surprise... ✨</div>

<!-- ADMIN BUTTON -->
<button id="adminBtn">☰ My Space</button>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <h3>Login 🔐</h3>
  <input id="user" type="text" placeholder="Username"><br><br>
  <input id="pass" type="password" placeholder="Password"><br><br>
  <button id="loginBtn">Enter</button>
</div>

<!-- MUSIC -->
<audio id="bgMusic" src="./music.mp3" loop></audio>

<!-- HEARTS -->
<div id="hearts"></div>

<!-- MAIN -->
<div id="main">

  <img id="profilePic" src="./image/bhoomika.jpg">

  <h1>Happy Birthday Bhoomika 🎂</h1>

  <p>Some people don’t just come into life... they stay, they change everything ❤️</p>

  <div id="giftContainer">
    <img id="giftImage" src="./image/gift.png">
  </div>

  <div id="bigMessage">
    You are one of the best things that ever happened in my life 💖
  </div>

  <div id="surpriseText" class="hidden">
    <span id="typedText"></span>
  </div>

  <div id="menu" class="hidden">
    <button onclick="openPage('timer')">⏳ Timer</button>
    <button onclick="openPage('video')">🎥 Video</button>
    <button onclick="openPage('book')">📖 Scrapbook</button>
  </div>

</div>

<div id="timerPage" class="hidden">
  <div id="bigTimer"></div>
  <button onclick="goBack()">Back</button>
</div>

<div id="videoPage" class="hidden">
  <video controls src="./video.mp4"></video>
  <button onclick="goBack()">Back</button>
</div>

<div id="book" class="hidden">
  <div id="pagesContainer"></div>

  <button onclick="prevPage()">⬅</button>
  <button onclick="nextPage()">➡</button>
  <button onclick="goBack()">Back</button>
</div>

<script src="script.js"></script>

</body>
</html>
