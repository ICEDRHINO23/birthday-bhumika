<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Bhoomika 🎂</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INTRO -->
<div id="intro">✨ Loading Surprise... ✨</div>

<!-- ADMIN BUTTON -->
<button id="adminBtn">☰ My Space</button>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <h3>Login 🔐</h3>
  <input id="user" placeholder="BBday"><br><br>
  <input id="pass" type="password" placeholder="b1252001"><br><br>
  <button onclick="login()">Enter</button>
</div>

<!-- BACKGROUND MUSIC -->
<audio id="bgMusic" src="./music.mp3" loop></audio>

<!-- FLOATING HEARTS -->
<div id="hearts"></div>

<!-- MAIN CONTENT -->
<div id="main">

  <!-- PROFILE IMAGE -->
  <img id="profilePic" src="./image/bhoomika.jpg" alt="Bhoomika">

  <h1>Happy Birthday Bhoomika 🎂</h1>

  <p>
    Some people don’t just come into life... they stay, they change everything ❤️
  </p>

  <!-- GIFT -->
  <div id="giftContainer">
    <img id="giftImage" src="./image/gift.png">
  </div>

  <!-- BIG MESSAGE -->
  <div id="bigMessage">
    You are one of the best things that ever happened in my life 💖
  </div>

  <!-- TYPING MESSAGE -->
  <div id="surpriseText" class="hidden">
    <span id="typedText"></span>
  </div>

  <!-- MENU -->
  <div id="menu" class="hidden">
    <h2>Choose Something 💝</h2>

    <button onclick="openPage('timer')">⏳ Countdown</button>
    <button onclick="openPage('video')">🎬 Video</button>
    <button onclick="openPage('book')">📖 Scrapbook</button>
  </div>

</div>

<!-- TIMER PAGE -->
<div id="timerPage" class="hidden">
  <h2>Countdown 🎂</h2>
  <div id="bigTimer"></div>
  <button onclick="goBack()">Back</button>
</div>

<!-- VIDEO PAGE -->
<div id="videoPage" class="hidden">
  <video controls src="./video.mp4"></video>
  <button onclick="goBack()">Back</button>
</div>

<!-- SCRAPBOOK -->
<div id="book" class="hidden">

  <div id="pagesContainer"></div>

  <div>
    <button onclick="prevPage()">⬅</button>
    <button onclick="nextPage()">➡</button>
    <button onclick="goBack()">Back</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
