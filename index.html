<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Bhoomika 🎂</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INTRO -->
<div id="intro">✨ Loading Surprise... ✨</div>

<!-- ADMIN BUTTON -->
<button id="adminBtn">☰ My Space</button>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <h3>Login 🔐</h3>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button id="loginBtn">Enter</button>
</div>

<!-- MUSIC -->
<audio id="bgMusic" src="./audio/music.mp3" loop></audio>

<!-- HEARTS -->
<div id="hearts"></div>

<!-- MAIN CONTENT -->
<div id="main">

  <!-- PROFILE IMAGE -->
  <img id="profilePic" src="./image/bhoomika.jpg">

  <h1>Happy Birthday Bhoomika 🎂</h1>

  <p>
    Some people don’t just come into life… they stay, they change everything ❤️
  </p>

  <!-- 🎁 GIFT -->
  <div id="giftContainer">
    <img id="giftImage" src="./image/gift-closed.PNG">
  </div>

  <!-- BIG MESSAGE -->
  <div id="bigMessage">
    You are one of the best things that ever happened in my life 💖
  </div>

  <!-- MENU (HIDDEN INITIALLY) -->
  <div id="menu" class="hidden">
    <h2>Open Your Surprise 💝</h2>

    <!-- ✅ FIXED BUTTON -->
    <button onclick="openBook()">📖 Open Scrapbook</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
