<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Bhoomika 🎂</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INTRO -->
<div id="intro">✨ Loading Surprise... ✨</div>

<!-- ADMIN BUTTON -->
<button id="adminBtn">☰ My Space</button>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <h3>Login 🔐</h3>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button id="loginBtn">Enter</button>
</div>

<!-- MUSIC -->
<audio id="bgMusic" src="./audio/music.mp3" loop></audio>

<!-- MAIN -->
<div id="main">

  <img id="profilePic" src="./image/bhoomika.jpg">

  <h1>Happy Birthday Bhoomika 🎂</h1>

  <p>Some people don’t just come into life… they stay, they change everything ❤️</p>

  <!-- 🎁 GIFT -->
  <div id="giftContainer">
    <img id="giftImage" src="./image/gift-closed.PNG">
  </div>

  <!-- 💖 BIG MESSAGE -->
  <div id="bigMessage">
    You are one of the best things that ever happened in my life 💖
  </div>

  <!-- 😂 FUN SECTION -->
  <div id="funSection" class="hidden">
    <h2>Wait wait 😂</h2>
    <p id="funText"></p>
    <button onclick="continueAfterFun()">Continue 👉</button>
  </div>

  <!-- MENU -->
  <div id="menu" class="hidden">
    <h2>Now open your real surprise 💝</h2>
    <button onclick="openScrapbookPage()">📖 Open Scrapbook</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
