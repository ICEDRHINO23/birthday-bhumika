<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Bhoomika 🎂</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- MUSIC -->
<audio id="bgMusic" src="./audio/music.mp3" loop></audio>

<!-- HEARTS -->
<div id="hearts"></div>

<!-- ADMIN BUTTON -->
<button id="adminBtn">☰ My Space</button>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <h3>Login</h3>
  <input type="text" id="user" placeholder="Username">
  <input type="password" id="pass" placeholder="Password">
  <button onclick="login()">Enter</button>
</div>

<!-- INTRO -->
<div id="intro">Loading Surprise...</div>

<!-- HOME -->
<div id="home">

  <!-- PROFILE -->
  <div id="profileContainer">
    <img src="./image/bhoomika.jpg" id="profileImg">
  </div>

  <h1>Happy Birthday Bhoomika 🎂</h1>

  <p id="heroText">
    Some people don’t just come into life…  
    they stay, they change everything, and they become a part of you ❤️
  </p>

  <!-- GIFT -->
  <div id="giftContainer">
    <img src="./image/gift-closed.PNG" id="giftImage">
  </div>

</div>

<!-- BIG MESSAGE (STATIC — NO TYPING) -->
<h1 id="bigMessage" class="hidden">
  You are one of the best things that ever happened in my life 💖
</h1>

<!-- TYPING MESSAGE -->
<div id="surpriseText" class="hidden">
  <h2 id="typedText"></h2>
</div>

<!-- MENU -->
<div id="menu" class="hidden">
  <h2>Choose Something 💖</h2>
  <button onclick="openPage('timer')">⏳ Countdown</button>
  <button onclick="openPage('video')">🎥 Video</button>
  <button onclick="openPage('book')">📖 Scrapbook</button>
</div>

<!-- TIMER -->
<div id="timerPage" class="hidden">
  <h2>Countdown 🎂</h2>
  <div id="bigTimer"></div>
  <button onclick="goBack()">⬅ Back</button>
</div>

<!-- VIDEO -->
<div id="videoPage" class="hidden"></div>

<!-- SCRAPBOOK -->
<div id="book" class="hidden">

  <div id="pagesContainer"></div>

  <div id="bookControls">
    <button onclick="prevPage()">⬅</button>
    <button onclick="nextPage()">➡</button>
    <button onclick="goBack()">Back</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
