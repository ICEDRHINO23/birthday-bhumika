<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Bhoomika 🎂</title>
  <link rel="stylesheet" href="style.css">

  <!-- Fix favicon error -->
  <link rel="icon" href="data:,">
</head>

<body>

<!-- INTRO -->
<div id="intro">✨ Loading Surprise... ✨</div>

<!-- ADMIN BUTTON -->
<button id="adminBtn">☰ My Space</button>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <h3>Login 🔐</h3>
  <input id="user" placeholder="username"><br><br>
  <input id="pass" type="password" placeholder="password"><br><br>
  <button id="loginBtn">Enter</button>
</div>

<!-- MUSIC -->
<audio id="bgMusic" src="./audio/music.mp3" loop></audio>

<!-- HEARTS -->
<div id="hearts"></div>

<!-- MAIN -->
<div id="main">

  <!-- PROFILE -->
  <img id="profilePic" src="./image/bhoomika.jpg">

  <h1>Happy Birthday Bhoomika 🎂</h1>

  <p>
    Some people don’t just come into life…  
    they stay, they change everything ❤️
  </p>

  <!-- GIFT -->
  <div id="giftContainer">
    <img id="giftImage" src="./image/gift-closed.PNG">
  </div>

  <!-- BIG MESSAGE -->
  <div id="bigMessage">
    You are one of the best things that ever happened in my life 💖
  </div>

  <!-- TYPING TEXT -->
  <div id="surpriseText" class="hidden">
    <span id="typedText"></span>
  </div>

  <!-- MENU -->
  <div id="menu" class="hidden">

    <h2>Choose Something 💝</h2>

    <button onclick="openPage('timer')">⏳ Countdown</button>

    <button onclick="openPage('video')">🎬 Video</button>

    <!-- ✅ UPDATED BUTTON -->
    <button onclick="window.location.href='scrapbook.html'">
      📖 Scrapbook
    </button>

  </div>

</div>

<!-- TIMER -->
<div id="timerPage" class="hidden">
  <h2>Countdown 🎂</h2>
  <div id="bigTimer"></div>
  <button onclick="goBack()">Back</button>
</div>

<!-- VIDEO -->
<div id="videoPage" class="hidden">
  <video controls src="./videos/bhumika.mp4"></video>
  <button onclick="goBack()">Back</button>
</div>

<script src="script.js"></script>

</body>
</html>
