<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Bhoomika 🎂</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔐 ADMIN BUTTON -->
<button id="adminBtn">☰ My Space</button>

<!-- 🔐 ADMIN SLIDER -->
<div id="adminPanel">
  <h3>Login 🔐</h3>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Enter</button>
</div>

<!-- INTRO -->
<div id="intro">This is a Surprise 🎁</div>

<!-- HERO -->
<div id="hero">
  <img src="./images/bhumika.jpg">
  <h1>Happy Birthday Bhoomika 🎂</h1>
  <p>Some people don’t just come into life… they stay and make it better 💖</p>
</div>

<!-- GIFT -->
<div id="giftContainer">
  <img id="giftImage" src="./image/gift-closed.PNG">
</div>

<!-- MENU -->
<div id="menu" class="hidden">
  <h2>Select Your Surprise 🎁</h2>

  <button onclick="openPage('timer')">⏳ Timer</button>
  <button onclick="openPage('video')">🎥 Effort Video</button>
  <button onclick="openPage('book')">💖 Scrapbook</button>
</div>

<!-- TIMER -->
<div id="timerPage" class="hidden">
  <h1>Countdown 🎂</h1>
  <div id="bigTimer"></div>
  <button onclick="goBack()">⬅ Back</button>
</div>

<!-- VIDEO -->
<div id="videoPage" class="hidden">
  <h1>Effort Video 🎥</h1>
  <button onclick="goBack()">⬅ Back</button>
</div>

<!-- SCRAPBOOK -->
<div id="book" class="hidden">
  <h1>Memories 💖</h1>

  <div id="pagesContainer"></div>

  <div id="bookControls">
    <button onclick="prevPage()">⬅ Prev</button>
    <button onclick="nextPage()">Next ➡</button>
    <button onclick="goBack()">⬅ Back</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
