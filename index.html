<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday 🎉</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<!-- 🎵 BACKGROUND MUSIC -->
<audio id="bgMusic" src="audio/bds.mp3" loop></audio>

<!-- 🔄 INTRO -->
<div id="intro">Loading Surprise...</div>

<!-- 🎉 MAIN CONTENT -->
<div id="main" class="hidden">

  <h1>Happy Birthday 💖</h1>

  <!-- 🎁 GIFT -->
  <img id="giftBox" src="image/gift-closed.PNG" onclick="openGift()">

  <!-- 🎉 CONTENT AFTER OPEN -->
  <div id="content" class="hidden">

    <!-- PROFILE -->
    <img id="profilePic" src="image/bhoomika.jpg">

    <br>

    <!-- 💌 CARD -->
    <div id="cardSection">
      <div class="card" onclick="openCard(this)">
        <div class="card-front">
          <h2>Open Me 💌</h2>
        </div>
        <div class="card-inside">
          <p style="padding:20px;">
            Happy Birthday ❤️  
            ALL THE BEST DEAR 💖
          </p>
        </div>
      </div>
    </div>

  </div>

</div>

<script>

/* ⏳ LOADER */
setTimeout(() => {
  document.getElementById("intro").style.display = "none";
  document.getElementById("main").classList.remove("hidden");
}, 2000);

/* 🎁 OPEN GIFT */
function openGift() {
  const gift = document.getElementById("giftBox");

  gift.src = "image/gift-open.PNG";

  setTimeout(() => {
    document.getElementById("content").classList.remove("hidden");
  }, 800);
}

/* 🎵 MUSIC (REQUIRED FOR MOBILE) */
document.addEventListener("click", () => {
  const music = document.getElementById("bgMusic");

  if (music && music.paused) {
    music.volume = 0.4;
    music.play().catch(()=>{});
  }
}, { once: true });

/* 🔀 NAVIGATION */
function goMemory() {
  window.location.href = "memories.html";
}

function goAlbum() {
  window.location.href = "scrapbook.html";
}

function goCake() {
  window.location.href = "cake.html";
}

/* 💌 CARD */
function openCard(card) {
  card.classList.toggle("open");
}
</script>

<script src="script.js"></script>
</body>
</html>
