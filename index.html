<!DOCTYPE html>
<html>
<head>
  <title>Birthday 🎉</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INTRO LOADING -->
<div id="intro">
  Loading Surprise...
</div>

<!-- MAIN CONTENT -->
<div id="main" class="hidden">

  <h1>Happy Birthday 💖</h1>

  <!-- PROFILE IMAGE -->
  <img id="profilePic" src="image/photo1.jpg">

  <br>

  <button onclick="goMemory()">Memories</button>
  <button onclick="goAlbum()">Scrapbook</button>

  <!-- 🎂 CAKE SECTION -->
  <div id="cakeSection">

    <div class="cake" id="cake">

      <div class="cake-half left">
        <div class="slice">
          <div class="layer top"></div>
          <div class="cream"></div>
          <div class="layer middle"></div>
          <div class="cream"></div>
          <div class="layer bottom"></div>
        </div>
      </div>

      <div class="cake-half right">
        <div class="slice">
          <div class="layer top"></div>
          <div class="cream"></div>
          <div class="layer middle"></div>
          <div class="cream"></div>
          <div class="layer bottom"></div>
        </div>
      </div>

      <!-- CANDLES -->
      <div class="candles">
        <div class="candle lit"></div>
        <div class="candle lit"></div>
        <div class="candle lit"></div>
      </div>

      <!-- KNIFE -->
      <div id="knife"></div>

    </div>

    <button onclick="cutCake()">Cut Cake 🎂</button>

  </div>

  <!-- 💌 CARD -->
  <div id="cardSection">
    <div class="card" onclick="openCard(this)">
      <div class="card-front">
        <h2>Open Me 💌</h2>
      </div>
      <div class="card-inside">
        <p style="padding:20px;">
          Happy Birthday ❤️  
          You mean a lot to me 💖
        </p>
      </div>
    </div>
  </div>

</div>

<script>

// INTRO LOADER
setTimeout(() => {
  document.getElementById("intro").style.display = "none";
  document.getElementById("main").classList.remove("hidden");
}, 2000);

// NAVIGATION
function goMemory() {
  window.location.href = "memories.html";
}

function goAlbum() {
  window.location.href = "album.html";
}

// CAKE CUT
function cutCake() {
  document.getElementById("cake").classList.add("split");
  document.getElementById("knife").classList.add("animate");
}

// CARD
function openCard(card) {
  card.classList.toggle("open");
}

</script>

</body>
</html>
