<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Bhoomika 🎂</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INTRO -->
<div id="intro">✨ Loading Surprise... ✨</div>

<!-- BACKGROUND -->
<div id="bgBlur"></div>
<div id="overlay"></div>

<!-- ADMIN BUTTON -->
<button id="adminBtn">☰ My Space</button>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <h3>Login 🔐</h3>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button id="loginBtn">Enter</button>
</div>

<!-- MUSIC -->
<audio id="bgMusic" src="./audio/music.mp3" loop></audio>

<!-- HEARTS -->
<div id="hearts"></div>

<!-- MAIN -->
<div id="main">

  <img id="profilePic" src="./image/bhoomika.jpg">

  <h1>Happy Birthday Bhoomika 🎂</h1>

  <p>Some people don’t just come into life… they stay, they change everything ❤️</p>

  <!-- 🔥 TIMER ALWAYS VISIBLE -->
  <div id="timerBox">
    <h2>Countdown 🎂</h2>
    <div id="bigTimer"></div>
  </div>

  <!-- GIFT -->
  <div id="giftContainer">
    <!-- ✅ FIXED IMAGE NAME -->
    <img id="giftImage" src="./image/gift-closed.PNG">
  </div>

  <!-- BIG MESSAGE -->
  <div id="bigMessage">
    You are one of the best things that ever happened in my life 💖
  </div>

  <!-- TYPING -->
  <div id="surpriseText" class="hidden">
    <span id="typedText"></span>
  </div>

  <!-- MENU (ONLY AFTER GIFT) -->
  <div id="menu" class="hidden">
    <h2>Choose Something 💝</h2>

    <!-- ❌ REMOVED TIMER BUTTON -->
    <button onclick="openPage('video')">🎬 Video</button>
    <button onclick="openPage('book')">📖 Scrapbook</button>
  </div>

</div>

<!-- VIDEO PAGE -->
<div id="videoPage" class="hidden">
  <video controls src="./videos/bhumika.mp4"></video>
  <button onclick="goBack()">Back</button>
</div>

<!-- SCRAPBOOK -->
<div id="book" class="hidden">
  <div id="pagesContainer"></div>

  <div id="controls">
    <button onclick="prevPage()">⬅</button>
    <button onclick="nextPage()">➡</button>
    <button onclick="goBack()">Back</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
