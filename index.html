<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Bhoomika 🎂</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOADING -->
<div id="intro">✨ Loading Surprise... ✨</div>

<!-- MUSIC -->
<audio id="bgMusic" src="./assets/audio/bds.mp3" loop></audio>

<div id="main">

  <img id="profilePic" src="./assets/images/bhoomika.jpg">

  <h1>Happy Birthday Bhoomika 🎂</h1>

  <p>Some people don’t just come into life… they stay ❤️</p>

  <!-- GAME -->
  <div id="gameBox">
    <h3>🎯 Tap 5 times to unlock surprise</h3>
    <button id="tapBtn">Tap Me</button>
    <p id="tapCount"></p>
  </div>

  <!-- GIFT -->
  <div id="giftContainer" class="hidden">
    <img id="giftImage" src="./assets/images/gift-closed.PNG">
  </div>

  <!-- MENU -->
  <div id="menu" class="hidden">
    <h2>Open your surprise 💝</h2>
    <button onclick="openScrapbook()">📖 Scrapbook</button>
    <button onclick="openMemories()">📸 Memories</button>
    <button onclick="openVideo()">🎥 Special Video</button>
  </div>

  <!-- VIDEO SECTION -->
  <div id="videoSection" class="hidden">
    <h2>💖 A Special Surprise 💖</h2>

    <video id="specialVideo" controls>
      <source src="./assets/videos/special.mp4" type="video/mp4">
    </video>

    <br>
    <button onclick="closeVideo()">⬅ Back</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
