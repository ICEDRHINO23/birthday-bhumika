<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Bhoomika 🎂</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- =========================
   INTRO
========================= -->
<div id="intro">This is a Surprise 🎁</div>

<!-- =========================
   HERO SECTION
========================= -->
<div id="hero">
  <img src="./images/bhumika.jpg" alt="Bhoomika">
  <h1>Happy Birthday Bhoomika 🎂</h1>
  <p class="subText">
    Some people don’t just come into life… they stay and make it better 💖
  </p>
</div>

<!-- =========================
   FUN TEXT
========================= -->
<div id="funText">Click the Gift 🎁</div>

<!-- =========================
   GIFT
========================= -->
<div id="giftContainer">
  <img id="giftImage" src="./image/gift-closed.PNG" alt="Gift">
</div>

<!-- =========================
   MENU
========================= -->
<div id="menu" class="hidden">
  <h2>Select Your Surprise 🎁</h2>

  <button onclick="openPage('timer')">⏳ Timer</button>
  <button onclick="openPage('video')">🎥 Effort Video</button>
  <button onclick="openPage('book')">💖 Scrapbook</button>
</div>

<!-- =========================
   TIMER PAGE
========================= -->
<div id="timerPage" class="hidden">
  <h1>Countdown 🎂</h1>
  <div id="bigTimer"></div>
  <button onclick="goBack()">⬅ Back</button>
</div>

<!-- =========================
   VIDEO PAGE
========================= -->
<div id="videoPage" class="hidden">
  <h1>Effort Video 🎥</h1>
  <!-- video loads dynamically -->
  <button onclick="goBack()">⬅ Back</button>
</div>

<!-- =========================
   SCRAPBOOK
========================= -->
<div id="book" class="hidden">

  <h1>Memories 💖</h1>

  <!-- dynamic pages -->
  <div id="pagesContainer"></div>

  <!-- controls -->
  <div id="bookControls">
    <button onclick="prevPage()">⬅ Prev</button>
    <button onclick="nextPage()">Next ➡</button>
    <button onclick="goBack()">⬅ Back</button>
  </div>

</div>

<!-- =========================
   SCRIPT
========================= -->
<script src="script.js"></script>

</body>
</html>
