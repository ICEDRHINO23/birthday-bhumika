<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Bhoomika 🎉</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>

<body>

<div id="intro">This is a Surprise 🎁</div>

<div class="bg"></div>

<div id="funText">Catch the Gift 😜</div>

<!-- 🎁 GIFT -->
<div id="gift">
  <div class="lid"></div>
  <div class="box"></div>
</div>

<!-- 🎛 MENU -->
<div id="menu" style="display:none;">
  <h2>Select Your Surprise 🎁</h2>

  <button onclick="openPage('timer')">⏳ Birthday Countdown</button>
  <button onclick="openPage('video')">🎥 Effort Video</button>
  <button onclick="openPage('book')">💖 Scrap Book</button>
</div>

<!-- ⏳ TIMER -->
<div id="timerPage" style="display:none;">
  <h1>🎂 Countdown</h1>
  <div id="bigTimer"></div>
  <button onclick="goBack()">⬅ Back</button>
</div>

<!-- 🎥 VIDEO -->
<div id="videoPage" style="display:none;">
  <h1>🎥 Special Video</h1>
  <video src="./images/birthday-video.mp4" controls></video>
  <button onclick="goBack()">⬅ Back</button>
</div>

<!-- 📖 BOOK -->
<div id="book">

  <div class="page" id="p1">
    <div class="left">
      <video src="./images/bhumika.mp4" autoplay loop muted></video>
    </div>
    <div class="right">You make life brighter ✨</div>
  </div>

  <div class="page" id="p2">
    <div class="left">
      <img src="./images/photo1.jpg">
    </div>
    <div class="right">Memories with you are special 💖</div>
  </div>

  <div class="page" id="p3">
    <div class="left">
      <img src="./images/photo2.jpg">
    </div>
    <div class="right">Today is all about YOU 🎉</div>
  </div>

</div>

<div id="final">💌 Happy Birthday Bhoomika 💖</div>

<canvas id="butterflyCanvas"></canvas>

<div id="countdown"></div>

<audio id="bgMusic" src="./audio/bg.mp3" loop></audio>
<audio id="openSound" src="./audio/open.mp3"></audio>
<audio id="flipSound" src="./audio/flip.mp3"></audio>

<script src="script.js"></script>

</body>
</html>
