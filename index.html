<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎉</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="intro">This is a Surprise 🎁</div>

<div id="funText">Catch the Gift 😜</div>

<!-- 🎁 3D GIFT -->
<div id="gift">
  <div class="gift-box">
    <div class="lid"></div>
    <div class="base"></div>
    <div class="ribbon-v"></div>
    <div class="ribbon-h"></div>
  </div>
</div>

<!-- MENU -->
<div id="menu" class="hidden">
  <h2>Select Your Surprise 🎁</h2>
  <button onclick="openPage('timer')">⏳ Timer</button>
  <button onclick="openPage('video')">🎥 Video</button>
  <button onclick="openPage('book')">💖 Scrapbook</button>
</div>

<!-- TIMER -->
<div id="timerPage" class="hidden">
  <h1>Countdown 🎂</h1>
  <div id="bigTimer"></div>
  <button onclick="goBack()">⬅ Back</button>
</div>

<!-- VIDEO -->
<div id="videoPage" class="hidden">
  <h1>Video 🎥</h1>
  <video src="./videos/bhumika.mp4" controls></video>
  <button onclick="goBack()">⬅ Back</button>
</div>

<!-- 📖 SCRAPBOOK -->
<div id="book" class="hidden">
  <div class="flip-container">

    <div class="page active">
      <img src="./scrapbook/20240429_230322.jpg">
    </div>

    <div class="page">
      <img src="./scrapbook/20240906_204953.jpg">
    </div>

    <div class="page">
      <img src="./scrapbook/VideoCapture_20240427-034201.jpg">
    </div>

    <div class="page">
      <video src="./scrapbook/bhumika.mp4" autoplay muted loop></video>
    </div>

  </div>

  <div class="controls">
    <button onclick="prevPage()">⬅</button>
    <button onclick="nextPage()">➡</button>
    <button onclick="goBack()">Back</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
