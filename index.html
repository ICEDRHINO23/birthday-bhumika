<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎉</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h1>This is a Surprise 🎁</h1>
</div>

<!-- TOP TEXT -->
<div id="funText">Catch the Gift 😜</div>

<!-- 🎁 IMAGE GIFT -->
<div id="giftContainer">
  <img id="giftImage" src="./images/gift-closed.png">
</div>

<!-- MENU -->
<div id="menu" class="hidden">
  <h2>Select Your Surprise 🎁</h2>

  <button onclick="openPage('timer')">⏳ Timer</button>
  <button onclick="openPage('video')">🎥 Effort Video</button>
  <button onclick="openPage('book')">💖 Scrapbook</button>
</div>

<!-- TIMER -->
<div id="timerPage" class="hidden">
  <h1>Countdown 🎂</h1>
  <div id="bigTimer"></div>
  <button onclick="goBack()">⬅ Back</button>
</div>

<!-- VIDEO -->
<div id="videoPage" class="hidden">
  <h1>Video 🎥</h1>
  <video src="./videos/bhumika.mp4" controls></video>
  <button onclick="goBack()">⬅ Back</button>
</div>

<!-- SCRAPBOOK -->
<div id="book" class="hidden">
  <div id="pagesContainer">

    <div class="page active">
      <img src="./scrapbook/20240429_230322.jpg">
      <p>You make life brighter ✨</p>
    </div>

    <div class="page">
      <img src="./scrapbook/20240906_204953.jpg">
      <p>Every moment is special 💖</p>
    </div>

    <div class="page">
      <img src="./scrapbook/VideoCapture_20240427-034201.jpg">
      <p>Memories forever 🌸</p>
    </div>

    <div class="page">
      <video src="./scrapbook/bhumika.mp4" autoplay muted loop></video>
      <p>Moments to relive 🎬</p>
    </div>

  </div>

  <button onclick="prevPage()">⬅</button>
  <button onclick="nextPage()">➡</button>
  <button onclick="goBack()">⬅ Back</button>
</div>

<script src="script.js"></script>

</body>
</html>
