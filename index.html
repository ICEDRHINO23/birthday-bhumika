<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎉</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INTRO -->
<div id="intro">This is a Surprise 🎁</div>

<!-- TEXT -->
<div id="funText">Catch the Gift 😜</div>

<!-- GIFT -->
<div id="gift">
  <div class="lid"></div>
  <div class="box"></div>
</div>

<!-- MENU -->
<div id="menu" style="display:none;">
  <h2>Select Your Surprise 🎁</h2>

  <button onclick="openPage('timer')">⏳ Timer</button>
  <button onclick="openPage('video')">🎥 Video</button>
  <button onclick="openPage('book')">💖 Scrapbook</button>
</div>

<!-- TIMER -->
<div id="timerPage" style="display:none;">
  <h1>Countdown 🎂</h1>
  <div id="bigTimer"></div>
  <button onclick="goBack()">⬅ Back</button>
</div>

<!-- VIDEO -->
<div id="videoPage" style="display:none;">
  <h1>Video 🎥</h1>
  <button onclick="goBack()">⬅ Back</button>
</div>

<!-- 📖 SCRAPBOOK -->
<div id="book">

  <div id="pagesContainer">

    <div class="page active">
      <div class="left">
        <img src="./images/photo1.jpg">
      </div>
      <div class="right">
        You know what… some people make life brighter ✨
      </div>
    </div>

    <div class="page">
      <div class="left">
        <video src="./images/bhumika.mp4" autoplay loop muted></video>
      </div>
      <div class="right">
        Every moment with you is special 💖
      </div>
    </div>

  </div>

  <div style="margin-top:20px;">
    <button onclick="prevPage()">⬅ Prev</button>
    <button onclick="nextPage()">Next ➡</button>
    <button onclick="goBack()">⬅ Back</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
