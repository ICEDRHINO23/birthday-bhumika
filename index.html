<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Bhumika</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🎬 INTRO -->
<div id="intro">
    <h1>🎁 A Surprise for You...</h1>
</div>

<!-- 🌌 PARTICLES -->
<canvas id="particles"></canvas>

<!-- 🎊 CONFETTI -->
<canvas id="confettiCanvas"></canvas>

<!-- 😂 FUN TEXT -->
<div id="funText"></div>

<!-- 🦋 -->
<div id="butterflies"></div>

<!-- 🎁 GIFT -->
<div class="present" id="presentBox" style="display:none;">
    <div class="lid"></div>
    <div class="box"></div>
</div>

<!-- 📖 SCRAPBOOK -->
<div class="scrapbook" id="scrapbook" style="display:none;">

    <!-- PAGE 1 (VIDEO) -->
    <div class="page" id="page1">
        <div class="image-page">
            <video autoplay muted loop playsinline>
                <source src="bhumika.mp4" type="video/mp4">
            </video>
        </div>
        <div class="text-page">
            <p id="typingText"></p>
        </div>
    </div>

    <!-- PAGE 2 -->
    <div class="page" id="page2">
        <div class="image-page">
            <img src="20240429_230322.jpg">
        </div>
        <div class="text-page">
            <p>Every moment with you is special ✨</p>
        </div>
    </div>

    <!-- PAGE 3 -->
    <div class="page" id="page3">
        <div class="image-page">
            <img src="20240906_204953.jpg">
        </div>
        <div class="text-page">
            <p>You deserve all happiness 🎉</p>
        </div>
    </div>

    <!-- PAGE 4 -->
    <div class="page" id="page4">
        <div class="image-page">
            <img src="VideoCapture_20240427-034201.jpg">
        </div>
        <div class="text-page">
            <p>Happy Birthday Bhumika 💖</p>
        </div>
    </div>

    <!-- BUTTON -->
    <button class="next-btn" onclick="nextPage()">Next ➡</button>

</div>

<audio id="flipSound" src="flip.mp3"></audio>
<audio id="bgMusic" src="music.mp3" loop></audio>

<script src="script.js"></script>

</body>
</html>
