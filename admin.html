<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel 🔐</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #f8cdda, #f6d365);
      text-align: center;
    }

    .container {
      margin-top: 60px;
      background: white;
      display: inline-block;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    }

    h2 {
      color: #ff4d6d;
    }

    input, textarea {
      width: 280px;
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    textarea {
      height: 100px;
      resize: none;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.9;
    }

    #preview {
      margin-top: 10px;
    }

    #preview img,
    #preview video {
      width: 200px;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>Admin Panel 📖</h2>

  <!-- FILE INPUT -->
  <input type="file" id="fileInput"><br>

  <!-- PREVIEW -->
  <div id="preview"></div>

  <!-- TITLE -->
  <input type="text" id="title" placeholder="Enter title"><br>

  <!-- TEXT -->
  <textarea id="text" placeholder="Write emotional message..."></textarea><br>

  <!-- BUTTONS -->
  <button id="addBtn">Add Page</button>
  <button onclick="logout()">Logout 🚪</button>

</div>

<script>

/* =========================
   PREVIEW FILE
========================= */
document.getElementById("fileInput").addEventListener("change", function(){

  const file = this.files[0];
  const preview = document.getElementById("preview");

  preview.innerHTML = "";

  if(!file) return;

  const url = URL.createObjectURL(file);

  if(file.type.startsWith("video")){
    preview.innerHTML = `<video src="${url}" controls></video>`;
  } else {
    preview.innerHTML = `<img src="${url}">`;
  }

});

/* =========================
   ADD PAGE (FINAL)
========================= */
document.getElementById("addBtn").addEventListener("click", () => {

  const fileInput = document.getElementById("fileInput");
  const title = document.getElementById("title").value.trim();
  const text = document.getElementById("text").value.trim();

  const file = fileInput.files[0];

  if (!file) {
    alert("Select a file ❌");
    return;
  }

  if (!title || !text) {
    alert("Fill all fields ❌");
    return;
  }

  const reader = new FileReader();

  reader.onload = function (e) {

    const type = file.type.startsWith("video") ? "video" : "image";

    let data = JSON.parse(localStorage.getItem("scrapbook") || "[]");

    data.push({
      type: type,
      src: e.target.result,
      title: title,
      text: text
    });

    localStorage.setItem("scrapbook", JSON.stringify(data));

    alert("Page Added Successfully ✅");

    // clear form
    fileInput.value = "";
    document.getElementById("title").value = "";
    document.getElementById("text").value = "";
    document.getElementById("preview").innerHTML = "";

  };

  reader.readAsDataURL(file);

});

/* =========================
   LOGOUT
========================= */
function logout(){
  alert("Logged out 👋");
  window.location.href = "index.html";
}

</script>

</body>
</html>
