<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel 🔐</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #f8cdda, #f6d365);
  text-align: center;
}

.container {
  margin-top: 40px;
  background: white;
  display: inline-block;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

input, textarea {
  width: 260px;
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  padding: 10px 18px;
  margin: 8px;
  border-radius: 10px;
  border: none;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

#preview img,
#preview video {
  width: 180px;
  border-radius: 10px;
  margin-top: 10px;
}

#list {
  margin-top: 30px;
}
</style>

</head>

<body>

<div class="container">

<h2>Admin Panel 📖</h2>

<input type="file" id="fileInput"><br>

<div id="preview"></div>

<input type="text" id="title" placeholder="Enter title"><br>

<textarea id="text" placeholder="Write emotional message..."></textarea><br>

<button id="addBtn">Add Page ➕</button>
<button id="updateBtn">Update Page ✏️</button>
<button onclick="logout()">Logout 🚪</button>

</div>

<div id="list"></div>

<script>

/* =========================
   CONFIG
========================= */
const TOKEN = "PASTE_YOUR_REAL_TOKEN_HERE";
const REPO = "ICEDRHINO23/birthday-bhumika";
const FILE = "data/scrapbook.json";

let editIndex = null;

/* =========================
   PREVIEW
========================= */
fileInput.onchange = function(){
  const file = this.files[0];
  preview.innerHTML = "";

  if(!file) return;

  const url = URL.createObjectURL(file);

  preview.innerHTML = file.type.startsWith("video")
    ? `<video src="${url}" controls></video>`
    : `<img src="${url}">`;
};

/* =========================
   BASE64
========================= */
function toBase64(file){
  return new Promise(resolve=>{
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(file);
  });
}

/* =========================
   SAFE PARSE (FINAL FIX)
========================= */
function safeParse(fileData){

  if(!fileData || fileData.message){
    console.warn("GitHub error:", fileData);
    return [];
  }

  if(!fileData.content){
    return [];
  }

  try{
    return JSON.parse(atob(fileData.content));
  }catch(e){
    console.error("Decode error:", e);
    return [];
  }
}

/* =========================
   GET DATA
========================= */
async function getData(){

  const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`,{
    headers:{ Authorization:`token ${TOKEN}` }
  });

  if(!res.ok){
    console.error(await res.json());
    throw new Error("Auth/File error");
  }

  return await res.json();
}

/* =========================
   SAVE DATA
========================= */
async function saveData(data, sha){

  const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`,{
    method:"PUT",
    headers:{
      Authorization:`token ${TOKEN}`,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      message:"update scrapbook",
      content:btoa(JSON.stringify(data,null,2)),
      sha:sha
    })
  });

  if(!res.ok){
    console.error(await res.json());
    alert("❌ Save failed");
    return false;
  }

  return true;
}

/* =========================
   ADD PAGE
========================= */
addBtn.onclick = async () => {

  const file = fileInput.files[0];
  const titleVal = title.value.trim();
  const textVal = text.value.trim();

  if(!file || !titleVal || !textVal){
    alert("Fill all fields ❌");
    return;
  }

  try{

    const base64 = await toBase64(file);
    const filePath = `scrapbook/${Date.now()}-${file.name}`;

    const upload = await fetch(`https://api.github.com/repos/${REPO}/contents/${filePath}`,{
      method:"PUT",
      headers:{
        Authorization:`token ${TOKEN}`,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        message:"upload media",
        content:base64.split(",")[1]
      })
    });

    if(!upload.ok){
      console.error(await upload.json());
      alert("❌ Upload failed");
      return;
    }

    const fileData = await getData();
    let data = safeParse(fileData);

    data.push({
      type: file.type.startsWith("video") ? "video" : "image",
      src:`./${filePath}`,
      title:titleVal,
      text:textVal
    });

    const ok = await saveData(data, fileData.sha);

    if(ok){
      alert("Added ✅");
      location.reload();
    }

  }catch(err){
    console.error(err);
    alert("❌ Error occurred");
  }
};

/* =========================
   LOAD LIST (FIXED)
========================= */
async function loadList(){

  try{

    const fileData = await getData();
    const data = safeParse(fileData);

    list.innerHTML = "";

    if(!data.length){
      list.innerHTML = "<p>No pages yet</p>";
      return;
    }

    data.forEach((item,i)=>{
      list.innerHTML += `
        <div>
          <b>${item.title}</b><br>
          <button onclick="editPage(${i})">Edit</button>
          <button onclick="deletePage(${i})">Delete</button>
          <hr>
        </div>
      `;
    });

  }catch(err){
    console.error(err);
    list.innerHTML = "❌ Failed to load";
  }
}

loadList();

/* =========================
   EDIT
========================= */
window.editPage = async function(i){

  const fileData = await getData();
  const data = safeParse(fileData);

  const item = data[i];

  title.value = item.title;
  text.value = item.text;

  preview.innerHTML = item.type === "video"
    ? `<video src="${item.src}" controls></video>`
    : `<img src="${item.src}">`;

  editIndex = i;
};

/* =========================
   UPDATE
========================= */
updateBtn.onclick = async () => {

  if(editIndex === null){
    alert("Select page first ❌");
    return;
  }

  const fileData = await getData();
  let data = safeParse(fileData);

  data[editIndex].title = title.value.trim();
  data[editIndex].text = text.value.trim();

  const ok = await saveData(data, fileData.sha);

  if(ok){
    alert("Updated ✅");
    location.reload();
  }
};

/* =========================
   DELETE
========================= */
window.deletePage = async function(i){

  if(!confirm("Delete this page?")) return;

  const fileData = await getData();
  let data = safeParse(fileData);

  data.splice(i,1);

  const ok = await saveData(data, fileData.sha);

  if(ok){
    alert("Deleted 🗑️");
    location.reload();
  }
};

/* =========================
   LOGOUT
========================= */
function logout(){
  window.location.href="index.html";
}

</script>

</body>
</html>
