<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel 🔐</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #f8cdda, #f6d365);
  text-align: center;
}

.container {
  margin-top: 60px;
  background: white;
  display: inline-block;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

input, textarea {
  width: 280px;
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  padding: 10px 20px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}

#preview img,
#preview video {
  width: 200px;
  margin-top: 10px;
  border-radius: 10px;
}

#list {
  margin-top: 30px;
}

.card {
  background: white;
  padding: 15px;
  margin: 10px auto;
  width: 300px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="container">

<h2>Admin Panel 📖</h2>

<input type="file" id="fileInput"><br>
<div id="preview"></div>

<input type="text" id="title" placeholder="Enter title"><br>
<textarea id="text" placeholder="Write emotional message..."></textarea><br>

<button id="addBtn">Add Page ➕</button>
<button id="updateBtn">Update Page ✏️</button>
<button onclick="logout()">Logout 🚪</button>

</div>

<div id="list"></div>

<script>

/* =========================
   CONFIG
========================= */
const TOKEN = "PASTE_YOUR_TOKEN_HERE";
const REPO = "ICEDRHINO23/birthday-bhumika";
const FILE = "data/scrapbook.json";

let editIndex = null;

/* =========================
   PREVIEW
========================= */
fileInput.onchange = () => {
  const file = fileInput.files[0];
  preview.innerHTML = "";

  if (!file) return;

  const url = URL.createObjectURL(file);

  if (file.type.startsWith("video")) {
    preview.innerHTML = `<video src="${url}" controls></video>`;
  } else {
    preview.innerHTML = `<img src="${url}">`;
  }
};

/* =========================
   LOAD LIST
========================= */
async function loadList() {

  try {
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
      headers: {
        Authorization: `Bearer ${TOKEN}`,
        Accept: "application/vnd.github+json"
      }
    });

    if (!res.ok) throw new Error("Auth failed");

    const json = await res.json();

    let data = [];

    try {
      if (json.content) {
        data = JSON.parse(atob(json.content));
      }
    } catch {
      data = [];
    }

    renderList(data, json.sha);

  } catch (err) {
    list.innerHTML = "<p style='color:red'>❌ Failed to load (check token)</p>";
  }
}

/* =========================
   RENDER LIST
========================= */
function renderList(data, sha) {

  list.innerHTML = "";

  data.forEach((item, index) => {

    list.innerHTML += `
    <div class="card">
      ${item.type === "video"
        ? `<video src="${item.src}" controls></video>`
        : `<img src="${item.src}">`
      }
      <h4>${item.title}</h4>
      <p>${item.text}</p>

      <button onclick="editPage(${index})">Edit</button>
      <button onclick="deletePage(${index})">Delete</button>
    </div>
    `;
  });

  window.currentData = data;
  window.currentSha = sha;
}

/* =========================
   ADD PAGE
========================= */
addBtn.onclick = async () => {

  const file = fileInput.files[0];
  const t = title.value.trim();
  const txt = text.value.trim();

  if (!file || !t || !txt) {
    alert("Fill all fields ❌");
    return;
  }

  try {

    const base64 = await toBase64(file);
    const path = `scrapbook/${Date.now()}-${file.name}`;

    /* UPLOAD MEDIA */
    await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
      method: "PUT",
      headers: {
        Authorization: `Bearer ${TOKEN}`,
        Accept: "application/vnd.github+json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: "upload media",
        content: base64.split(",")[1]
      })
    });

    /* GET JSON */
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
      headers: {
        Authorization: `Bearer ${TOKEN}`,
        Accept: "application/vnd.github+json"
      }
    });

    const json = await res.json();

    let data = [];

    try {
      data = JSON.parse(atob(json.content));
    } catch {
      data = [];
    }

    data.push({
      type: file.type.startsWith("video") ? "video" : "image",
      src: `./${path}`,
      title: t,
      text: txt
    });

    /* UPDATE JSON */
    await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
      method: "PUT",
      headers: {
        Authorization: `Bearer ${TOKEN}`,
        Accept: "application/vnd.github+json",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: "update scrapbook",
        content: btoa(JSON.stringify(data, null, 2)),
        sha: json.sha
      })
    });

    alert("Uploaded ✅");

    loadList();

  } catch (err) {
    console.error(err);
    alert("Upload failed ❌");
  }
};

/* =========================
   EDIT
========================= */
function editPage(i) {
  const item = currentData[i];

  title.value = item.title;
  text.value = item.text;

  editIndex = i;
}

/* =========================
   UPDATE
========================= */
updateBtn.onclick = async () => {

  if (editIndex === null) {
    alert("Select item first");
    return;
  }

  currentData[editIndex].title = title.value;
  currentData[editIndex].text = text.value;

  await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
    method: "PUT",
    headers: {
      Authorization: `Bearer ${TOKEN}`,
      Accept: "application/vnd.github+json",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: "update page",
      content: btoa(JSON.stringify(currentData, null, 2)),
      sha: currentSha
    })
  });

  alert("Updated ✅");
  loadList();
};

/* =========================
   DELETE
========================= */
async function deletePage(i) {

  currentData.splice(i, 1);

  await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
    method: "PUT",
    headers: {
      Authorization: `Bearer ${TOKEN}`,
      Accept: "application/vnd.github+json",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: "delete page",
      content: btoa(JSON.stringify(currentData, null, 2)),
      sha: currentSha
    })
  });

  alert("Deleted 🗑️");
  loadList();
}

/* =========================
   HELPER
========================= */
function toBase64(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(file);
  });
}

/* =========================
   LOGOUT
========================= */
function logout(){
  window.location.href = "index.html";
}

/* INIT */
loadList();

</script>

</body>
</html>
