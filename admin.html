<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel 🔐</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #f8cdda, #f6d365);
      text-align: center;
    }

    .container {
      margin-top: 60px;
      background: white;
      display: inline-block;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    }

    input, textarea {
      width: 280px;
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
    }

    #preview img,
    #preview video {
      width: 200px;
      margin-top: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>Admin Panel 📖</h2>

  <input type="file" id="fileInput"><br>

  <div id="preview"></div>

  <input type="text" id="title" placeholder="Enter title"><br>

  <textarea id="text" placeholder="Write emotional message..."></textarea><br>

  <button id="addBtn">Upload to Scrapbook</button>
  <button onclick="logout()">Logout 🚪</button>

</div>

<script>

/* =========================
   CONFIG (IMPORTANT)
========================= */
const TOKEN = "YOUR_GITHUB_TOKEN";  // 🔥 put your token
const REPO = "ICEDRHINO23/birthday-bhumika";
const FILE = "data/scrapbook.json";

/* =========================
   PREVIEW
========================= */
document.getElementById("fileInput").addEventListener("change", function(){

  const file = this.files[0];
  const preview = document.getElementById("preview");

  preview.innerHTML = "";

  if(!file) return;

  const url = URL.createObjectURL(file);

  if(file.type.startsWith("video")){
    preview.innerHTML = `<video src="${url}" controls></video>`;
  } else {
    preview.innerHTML = `<img src="${url}">`;
  }

});

/* =========================
   ADD PAGE (GITHUB SAVE)
========================= */
document.getElementById("addBtn").addEventListener("click", async () => {

  const file = document.getElementById("fileInput").files[0];
  const title = document.getElementById("title").value.trim();
  const text = document.getElementById("text").value.trim();

  if (!file || !title || !text) {
    alert("Fill all fields ❌");
    return;
  }

  try {

    const base64 = await toBase64(file);
    const filePath = `scrapbook/${Date.now()}-${file.name}`;

    /* UPLOAD MEDIA */
    await fetch(`https://api.github.com/repos/${REPO}/contents/${filePath}`, {
      method: "PUT",
      headers: {
        Authorization: `token ${TOKEN}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: "upload media",
        content: base64.split(",")[1]
      })
    });

    /* GET EXISTING JSON */
    let res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
      headers: { Authorization: `token ${TOKEN}` }
    });

    let json = await res.json();
    let data = JSON.parse(atob(json.content));

    /* ADD NEW PAGE */
    data.push({
      type: file.type.startsWith("video") ? "video" : "image",
      src: `./${filePath}`,
      title: title,
      text: text
    });

    /* UPDATE JSON */
    await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
      method: "PUT",
      headers: {
        Authorization: `token ${TOKEN}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: "update scrapbook",
        content: btoa(JSON.stringify(data, null, 2)),
        sha: json.sha
      })
    });

    alert("Uploaded to GitHub ✅");

  } catch (err) {
    console.error(err);
    alert("Upload failed ❌");
  }

});

/* =========================
   HELPER
========================= */
function toBase64(file){
  return new Promise(resolve=>{
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(file);
  });
}

/* =========================
   LOGOUT
========================= */
function logout(){
  window.location.href = "index.html";
}

</script>

</body>
</html>
