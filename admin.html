<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
      padding: 40px;
    }

    h2 {
      color: #ff4d6d;
    }

    input, textarea {
      width: 300px;
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      background: #ff4d6d;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      display: inline-block;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>Add Scrapbook Page 📖</h2>

  <!-- FILE INPUT -->
  <input type="file" id="fileInput"><br>

  <!-- TITLE -->
  <input type="text" id="title" placeholder="Enter title"><br>

  <!-- TEXT -->
  <textarea id="text" placeholder="Write emotional message..."></textarea><br>

  <!-- ADD BUTTON -->
  <button id="addBtn">Add Page</button>

</div>

<script>

/* =========================
   ADD PAGE FUNCTION (FINAL)
========================= */
document.getElementById("addBtn").addEventListener("click", () => {

  const fileInput = document.getElementById("fileInput");
  const title = document.getElementById("title").value.trim();
  const text = document.getElementById("text").value.trim();

  const file = fileInput.files[0];

  if (!file) {
    alert("Please select a file ❌");
    return;
  }

  if (!title || !text) {
    alert("Fill title and text ❌");
    return;
  }

  const reader = new FileReader();

  reader.onload = function (e) {

    const type = file.type.startsWith("video") ? "video" : "image";

    let data = JSON.parse(localStorage.getItem("scrapbook") || "[]");

    data.push({
      type: type,
      src: e.target.result, // 🔥 stored as base64
      title: title,
      text: text
    });

    localStorage.setItem("scrapbook", JSON.stringify(data));

    alert("Page Added Successfully ✅");

    // clear fields
    fileInput.value = "";
    document.getElementById("title").value = "";
    document.getElementById("text").value = "";

  };

  reader.readAsDataURL(file);

});

</script>

</body>
</html>
