<!DOCTYPE html>
<html>
<head>
  <title>Birthday Card 💌</title>
  <link rel="stylesheet" href="style.css">
</head>

<body style="display:flex;justify-content:center;align-items:center;height:100vh;background:#000;">

<div class="card" onclick="this.classList.toggle('open')">

  <!-- FRONT -->
  <div class="card-front">
    <img src="image/cake.png" alt="Cake">
    <h2>Open Me 💌</h2>
  </div>

  <!-- INSIDE -->
  <div class="card-inside">

    <img src="image/cardin.jpg" alt="cute">

    <p style="padding:40px;">
      Happy Birthday Bhumika ❤️ <br>
      ALL THE BEST DEAR 💖 <br>

      “Your special day deserves something special 🎉” <br>
      “Unwrap this… it’s filled with smiles and memories 💝” <br>
      “A small gift for a big smile 😊”
    </p>

  </div>

</div>

<!-- HOME BUTTON -->
<button onclick="goHome()" style="position:fixed;top:20px;left:20px;">🏠</button>

<script>
function goHome() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
