<!DOCTYPE html>
<html>
<head>
  <title>Cake 🎂</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Cut the Cake 🎂</h1>

<div id="cakeSection">

  <div class="cake" id="cake">

    <div class="cake-half left">
      <div class="slice">
        <div class="layer top"></div>
        <div class="cream"></div>
        <div class="layer middle"></div>
        <div class="cream"></div>
        <div class="layer bottom"></div>
      </div>
    </div>

    <div class="cake-half right">
      <div class="slice">
        <div class="layer top"></div>
        <div class="cream"></div>
        <div class="layer middle"></div>
        <div class="cream"></div>
        <div class="layer bottom"></div>
      </div>
    </div>

    <div class="candles">
      <div class="candle"></div>
      <div class="candle"></div>
      <div class="candle"></div>
    </div>

    <div id="knife"></div>

  </div>

  <button onclick="cutCake()">Cut Cake 🎂</button>
  <button onclick="goHome()">🏠 Home</button>

</div>

<script src="cake.js"></script>

</body>
</html>
