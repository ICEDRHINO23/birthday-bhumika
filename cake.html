<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cake Surprise 🎂</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="memory-page">

<button class="home-btn" onclick="goHome()">🏠</button>
<button class="back-btn" onclick="goBack()">⬅</button>

<h2 style="text-align:center;">🎂 Make a Wish</h2>

<div id="cakeSection">

  <div class="cake" id="cake">

    <!-- LEFT -->
    <div class="half left">
      <div class="layer"></div>
      <div class="layer"></div>
      <div class="layer"></div>
    </div>

    <!-- RIGHT -->
    <div class="half right">
      <div class="layer"></div>
      <div class="layer"></div>
      <div class="layer"></div>
    </div>

    <!-- CANDLES -->
    <div class="candles">
      <div class="candle"></div>
      <div class="candle"></div>
      <div class="candle"></div>
    </div>

    <!-- KNIFE -->
    <div id="knife"></div>

  </div>

  <p id="msg">Tap candles to light them 🕯️</p>

</div>

<!-- CARD -->
<div id="cardSection" class="hidden">
  <div class="card">
    <div class="card-front" onclick="openCard()">💌 Tap</div>
    <div class="card-inside">
      <p>💖 Happy Birthday 💖</p>
    </div>
  </div>
</div>

<div id="confettiContainer"></div>

<script src="cake.js"></script>

<script>
function goHome(){ window.location.href="index.html"; }
function goBack(){ window.history.back(); }
</script>

</body>
</html>
