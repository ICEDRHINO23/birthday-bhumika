<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You 🎬</title>

  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
      flex-direction: column;
    }

    h2 {
      color: white;
      margin-bottom: 10px;
    }

    video {
      width: 90%;
      max-width: 900px;
      border-radius: 15px;
      box-shadow: 0 0 40px rgba(255,77,109,0.5);
    }

    .video-buttons {
      margin-top: 15px;
    }

    button {
      margin: 5px;
      padding: 10px 18px;
      border-radius: 10px;
      border: none;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      font-size: 15px;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<h2>🎬 Special Moments</h2>

<!-- 🎥 VIDEO PLAYER -->
<video id="player" controls playsinline></video>

<!-- 🔘 VIDEO SELECT BUTTONS -->
<div class="video-buttons">
  <button onclick="playVideo(0)">GIFT 1 💖</button>
  <button onclick="playVideo(1)">GIFT 2 ✨</button>
  <button onclick="playVideo(2)">GIFT 3 🎉</button>
  <button onclick="playVideo(3)">GIFT 4 💫</button>
</div>

<!-- 🔙 BACK -->
<button onclick="goBack()">⬅ Back</button>

<script>

/* =========================
   🎬 VIDEO LIST
========================= */
const videos = [
  "./videos/video1.mp4",
  "./videos/video2.mp4",
  "./videos/video3.mp4",
  "./videos/video4.mp4"
];

let currentVideo = 0;

/* =========================
   ▶ PLAY VIDEO
========================= */
function playVideo(index) {

  const player = document.getElementById("player");

  currentVideo = index;
  player.src = videos[index];
  player.load();

  player.play().catch(err => {
    console.log("Playback blocked:", err);
  });
}

/* =========================
   🔥 AUTO LOAD FIRST VIDEO
========================= */
window.addEventListener("DOMContentLoaded", () => {
  playVideo(0);
});

/* =========================
   ⏭ AUTO NEXT VIDEO
========================= */
const player = document.getElementById("player");

player.addEventListener("ended", () => {

  currentVideo++;

  if (currentVideo < videos.length) {
    playVideo(currentVideo);
  } else {
    currentVideo = 0; // 🔁 restart playlist
    playVideo(currentVideo);
  }

});

/* =========================
   ⌨️ KEY CONTROLS
========================= */
document.addEventListener("keydown", (e) => {

  if (e.key === "ArrowRight") {
    currentVideo = (currentVideo + 1) % videos.length;
    playVideo(currentVideo);
  }

  if (e.key === "ArrowLeft") {
    currentVideo =
      (currentVideo - 1 + videos.length) % videos.length;
    playVideo(currentVideo);
  }

});

/* =========================
   🔙 BACK
========================= */
function goBack() {
  window.location.href = "index.html";
}

</script>

</body>
</html>
