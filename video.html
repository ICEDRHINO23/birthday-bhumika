<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 🎬</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  font-family: Arial;
}

/* =========================
   TITLE
========================= */
h2 {
  color: white;
  margin-bottom: 10px;
}

/* =========================
   VIDEO WRAPPER
========================= */
.video-wrapper {
  position: relative;
  width: 90%;
  max-width: 900px;
  height: 70vh;

  display: flex;
  justify-content: center;
  align-items: center;

  overflow: hidden;
  border-radius: 15px;
}

/* =========================
   BLUR BACKGROUND VIDEO
========================= */
.video-bg {
  position: absolute;
  width: 100%;
  height: 100%;

  object-fit: cover;
  filter: blur(30px);
  transform: scale(1.2);
  opacity: 0.6;
}

/* =========================
   MAIN VIDEO
========================= */
#player {
  position: relative;
  max-width: 100%;
  max-height: 100%;

  object-fit: contain;
  z-index: 2;

  border-radius: 15px;
  box-shadow: 0 0 40px rgba(255,77,109,0.5);
}

/* =========================
   BUTTONS
========================= */
.video-buttons {
  margin-top: 15px;
}

button {
  margin: 5px;
  padding: 10px 18px;
  border-radius: 10px;
  border: none;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
  font-size: 15px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}
</style>

</head>

<body>

<h2>🎬 Special Moments</h2>

<!-- 🎥 VIDEO SECTION -->
<div class="video-wrapper">

  <!-- 🔥 BLUR BACKGROUND -->
  <video id="bgVideo" class="video-bg" muted loop></video>

  <!-- 🎬 MAIN PLAYER -->
  <video id="player" controls playsinline></video>

</div>

<!-- 🔘 VIDEO BUTTONS -->
<div class="video-buttons">
  <button onclick="playVideo(0)">Memory 1 💖</button>
  <button onclick="playVideo(1)">Memory 2 ✨</button>
  <button onclick="playVideo(2)">Memory 3 🎉</button>
  <button onclick="playVideo(3)">Memory 4 💫</button>
</div>

<!-- 🔙 BACK -->
<button onclick="goBack()">⬅ Back</button>

<script>

/* =========================
   VIDEO LIST
========================= */
const videos = [
  "./videos/video1.mp4",
  "./videos/video2.mp4",
  "./videos/video3.mp4",
  "./videos/video4.mp4"
];

let currentVideo = 0;

const player = document.getElementById("player");
const bgVideo = document.getElementById("bgVideo");

/* =========================
   PLAY VIDEO
========================= */
function playVideo(index) {

  currentVideo = index;

  player.src = videos[index];
  player.load();

  player.play().catch(()=>{});
}

/* =========================
   AUTO ADJUST (REELS STYLE)
========================= */
player.addEventListener("loadedmetadata", () => {

  const ratio = player.videoWidth / player.videoHeight;

  if (ratio < 1) {
    /* 📱 PORTRAIT */

    player.style.height = "100%";
    player.style.width = "auto";

    bgVideo.src = player.src;
    bgVideo.play().catch(()=>{});

  } else {
    /* 🖥 LANDSCAPE */

    player.style.width = "100%";
    player.style.height = "auto";

    bgVideo.pause();
    bgVideo.src = "";
  }

});

/* =========================
   AUTO LOAD FIRST
========================= */
window.onload = () => {
  playVideo(0);
};

/* =========================
   AUTO NEXT
========================= */
player.addEventListener("ended", () => {

  currentVideo++;

  if (currentVideo < videos.length) {
    playVideo(currentVideo);
  } else {
    currentVideo = 0;
    playVideo(currentVideo);
  }

});

/* =========================
   BACK
========================= */
function goBack() {
  window.location.href = "index.html";
}

</script>

</body>
</html>
