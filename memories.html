<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Memories 💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body class="memory-page">

  <!-- 🏠 HOME BUTTON -->
  <button class="home-btn" onclick="goHome()">🏠</button>

  <!-- 🧾 TITLE -->
  <h2 class="title">Our Memories 💖</h2>

  <!-- 🔘 MEMORY BUTTONS -->
  <div class="memory-buttons">
    <!-- Buttons are also generated by JS.
         If you keep these static ones, JS will ADD more below.
         If you don’t want duplicates, remove these and let JS generate them. -->
    <button onclick="openMemory('memory1')">Icecream & We Scream</button>
    <button onclick="openMemory('memory2')">KFC 1</button>
    <button onclick="openMemory('memory3')">Chai Gossip</button>
    <button onclick="openMemory('memory4')">Mumbai Crazy Ride</button>
    <button onclick="openMemory('memory5')">Tipsy Turtle</button>
    <button onclick="openMemory('memory6')">KFC 2</button>
    <button onclick="openMemory('memory7')">Bday @ KFC</button>
    <button onclick="openMemory('memory8')">Bday Boy</button>
    <button onclick="openMemory('memory9')">Backyard Palms</button>
    <button onclick="openMemory('memory10')">FC Social</button>
    <button onclick="openMemory('memory11')">School Days</button>
  </div>

  <!-- 📸 POLAROID VIEWER -->
  <div id="viewer" class="viewer hidden">

    <!-- ❌ CLOSE -->
    <button class="close-btn" onclick="closeViewer()">❌</button>

    <!-- STACK -->
    <div id="polaroidStack"></div>

  </div>

  <!-- 🎵 MEMORY MUSIC -->
  <audio id="memoryMusic" controls>
    <source src="assets/audio/mem1.mp3" type="audio/mpeg">
    Your browser does not support audio.
  </audio>

  <!-- ✅ IMPORTANT: LOAD JS AT END -->
  <script src="memories.js"></script>

</body>
</html>
