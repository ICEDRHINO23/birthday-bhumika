<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Scrapbook 📖</title>

<!-- ✅ IMPORTANT: ensure correct path -->
<link rel="stylesheet" href="./style.css">

</head>

<body class="book-body">

<!-- 🔥 SCENE -->
<div class="scene">
  <div class="book">

    <!-- 💖 COVER PAGE -->
    <div class="page cover-page" id="cover">
      <div class="front">
        <h2>The Story 📖</h2>
        <p>Happy Birthday Bhumika 🎂</p>
        <p>Tap to open your story 💖</p>
      </div>
      <div class="back"></div>
    </div>

    <!-- 📄 DYNAMIC PAGES -->
    <div id="pagesContainer"></div>

  </div>
</div>

<!-- 🎮 CONTROLS -->
<div class="controls">
  <button onclick="prevPage()">⬅ Prev</button>
  <button onclick="nextPage()">Next ➡</button>
  <button onclick="goHome()">🏠 Home</button>
</div>

<!-- 🎵 MUSIC -->
<audio id="scrapMusic" loop preload="auto">
  <source src="./audio/scrapbook.mp3" type="audio/mpeg">
</audio>

<!-- ✅ SCRIPT -->
<script src="./scrapbook.js"></script>

</body>
</html>
