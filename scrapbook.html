<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Our Scrapbook 📖</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="book-body">

<h1 class="book-title">Our Little Story 📖</h1>

<div class="scene">

  <div id="book" class="book">

    <!-- PAGE 1 -->
    <div class="page active">
      <div class="front">
        <div class="left">
          <img src="scrapbook/1.jpg">
        </div>
        <div class="right">
          <h2>The Beginning</h2>
          <p>Some people enter life quietly… without any grand moment...</p>
        </div>
      </div>
    </div>

    <!-- PAGE 2 -->
    <div class="page">
      <div class="front">
        <div class="left">
          <img src="scrapbook/2.jpg">
        </div>
        <div class="right">
          <p>Not every friendship gives peace… but this one did...</p>
        </div>
      </div>
    </div>

    <!-- PAGE 3 -->
    <div class="page">
      <div class="front">
        <div class="left">
          <img src="scrapbook/3.jpg">
        </div>
        <div class="right">
          <p>Some bonds don’t need explanation… they just exist...</p>
        </div>
      </div>
    </div>

    <!-- PAGE 4 (VIDEO) -->
    <div class="page">
      <div class="front">
        <div class="left">
          <video src="scrapbook/4.mp4" autoplay muted loop></video>
        </div>
        <div class="right">
          <p>Moments like these… stay longer than we expect...</p>
        </div>
      </div>
    </div>

  </div>

</div>

<div class="controls">
  <button onclick="prevPage()">⬅</button>
  <button onclick="nextPage()">➡</button>
  <button onclick="goHome()">🏠</button>
</div>

<script src="scrapbook.js"></script>

</body>
</html>
