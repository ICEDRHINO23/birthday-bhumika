<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scrapbook 📖</title>

<!-- IMPORTANT: go one level up -->
<link rel="stylesheet" href="../style.css">

</head>

<body class="book-body">

<div class="scene">
  <div class="book">

    <!-- COVER (REQUIRED FOR JS) -->
    <div id="cover" class="page cover-page">
      <div class="front">
        <h1>Our Story 💖</h1>
        <p>Click to open</p>
      </div>
      <div class="back"></div>
    </div>

    <!-- 🔥 THIS IS CRITICAL (JS injects pages here) -->
    <div id="pagesContainer"></div>

  </div>
</div>

<!-- OPTIONAL MUSIC (JS expects it) -->
<audio id="scrapMusic" src="../assets/audio/bds.mp3" loop></audio>

<!-- IMPORTANT: correct JS file -->
<script src="../scrapbook.js"></script>

</body>
</html>
