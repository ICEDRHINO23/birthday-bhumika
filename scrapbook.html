<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Scrapbook 📖</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="book-body">

<div class="scene">
  <div class="book">

    <!-- COVER -->
    <div class="page cover-page" id="cover">
      <div class="front">
        <h2>Our Story 📖</h2>
        <p>Happy Birthday 🎂</p>
        <p>Tap to open your story 💖</p>
      </div>
      <div class="back"></div>
    </div>

    <!-- PAGES -->
    <div id="pagesContainer"></div>

  </div>
</div>

<div class="controls">
  <button onclick="prevPage()">⬅ Prev</button>
  <button onclick="nextPage()">Next ➡</button>
  <button onclick="goHome()">🏠 Home</button>
</div>

<audio id="scrapMusic" src="./audio/scrapbook.mp3" loop></audio>

<script src="scrapbook.js"></script>
</body>
</html>
