<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Scrapbook 📖</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="book-body">

<h1 class="book-title">Our Story 📖</h1>

<div class="scene">
  <div class="book" id="book">

    <!-- ✅ COVER PAGE -->
    <div class="page cover-page" id="cover">

      <div class="front cover">
        <h2>Happy Birthday 🎂</h2>
        <p>Tap to open your story 💖</p>
      </div>

      <div class="back cover-back"></div>

    </div>

    <!-- ✅ VERY IMPORTANT: MUST EXIST -->
    <div id="pagesContainer"></div>

  </div>
</div>

<div class="controls">
  <button onclick="prevPage()">⬅</button>
  <button onclick="nextPage()">➡</button>
  <button onclick="goHome()">Back</button>
</div>

<!-- ✅ MUSIC -->
<audio id="scrapMusic" src="./audio/scrapbook.mp3" loop></audio>

<!-- ✅ SCRIPT MUST BE LAST -->
<script src="scrapbook.js"></script>

</body>
</html>
