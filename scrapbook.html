<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scrapbook 📖</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="book-body">

<!-- AUDIO -->
<audio id="scrapMusic" src="./audio/scrapbook.mp3" loop></audio>

<div class="scene">
  <div class="book">

    <!-- ✅ COVER (FIRST + FIXED) -->
    <div id="cover" class="page cover-page">
      <div class="front cover-front">
        <h1>Our Story 💖</h1>
        <p>Click to open</p>
      </div>
      <div class="back"></div>
    </div>

    <!-- PAGES -->
    <div id="pagesContainer"></div>

  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <button onclick="prevPage()">⬅ Prev</button>
  <button onclick="nextPage()">Next ➡</button>
  <button onclick="goHome()">🏠 Home</button>
</div>

<script src="scrapbook.js"></script>

</body>
</html>
