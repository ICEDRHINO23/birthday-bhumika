<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memory Album</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="memory-page">

<!-- 🔙 NAV BUTTONS -->
<button class="home-btn" onclick="goHome()">🏠</button>
<button class="back-btn" onclick="goBack()">⬅</button>

<!-- 📌 TITLE -->
<h2 class="title" id="albumTitle">Memory</h2>

<!-- 📸 STACK CONTAINER -->
<div class="card-stack" id="cardStack"></div>


<script>

/* =========================
   GET URL DATA
========================= */
const params = new URLSearchParams(window.location.search);
const folder = params.get("folder") || "memory1";
const title = params.get("title") || "Memories";

/* SET TITLE */
document.getElementById("albumTitle").innerText = decodeURIComponent(title);

/* =========================
   IMAGE LOADER
========================= */
const cardStack = document.getElementById("cardStack");

/* 👉 CHANGE COUNT IF NEEDED */
const totalImages = 3;

/* LOAD IMAGES */
for (let i = 1; i <= totalImages; i++) {

  const card = document.createElement("div");
  card.className = "stack-card";

  card.innerHTML = `
    <img src="./image/${folder}/${i}.jpg" alt="memory">
    <p>Memory ${i}</p>
  `;

  cardStack.appendChild(card);
}

/* =========================
   CARD INTERACTION
========================= */
const cards = document.querySelectorAll(".stack-card");

cards.forEach(card => {
  card.addEventListener("click", () => {

    cards.forEach(c => c.classList.remove("active"));
    card.classList.add("active");

  });
});

/* =========================
   NAVIGATION
========================= */
function goHome() {
  window.location.href = "index.html";
}

function goBack() {
  window.history.back();
}

</script>

</body>
</html>
